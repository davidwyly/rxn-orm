name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast lane: unit tests across PHP versions, against in-memory SQLite.
  # This is what every PR sees by default.
  unit:
    name: PHP ${{ matrix.php }} (sqlite in-memory)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, mbstring
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run tests
        run: vendor/bin/phpunit --colors=always

  # MySQL service-container lane. Uses the same test suite plus any
  # tests gated by RXN_ORM_MYSQL_DSN env var.
  mysql:
    name: MySQL 8 (PHP 8.3)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: rxn_orm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Wait for MySQL
        run: until mysqladmin ping -h 127.0.0.1 --silent; do sleep 1; done
      - name: Run tests
        env:
          RXN_ORM_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=rxn_orm_test
          RXN_ORM_MYSQL_USER: root
          RXN_ORM_MYSQL_PASS: ''
        run: vendor/bin/phpunit --colors=always

  # Postgres service-container lane.
  postgres:
    name: Postgres 16 (PHP 8.3)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rxn_orm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, pdo_sqlite, mbstring
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run tests
        env:
          RXN_ORM_PGSQL_DSN: pgsql:host=127.0.0.1;port=5432;dbname=rxn_orm_test
          RXN_ORM_PGSQL_USER: postgres
          RXN_ORM_PGSQL_PASS: postgres
        run: vendor/bin/phpunit --colors=always

  # Static analysis: lint + composer validate + PHPStan. Cheap; parallel.
  static:
    name: lint + phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite
          coverage: none
      - run: composer validate --strict
      - name: PHP syntax check
        run: find src tests bench -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github
      - name: PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction
